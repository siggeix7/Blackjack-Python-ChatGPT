name: Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: Build and publish APK
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Android SDK packages
        shell: bash
        run: |
          SDK_ROOT="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-${RUNNER_TEMP:-/tmp}/android-sdk}}"
          SDKMANAGER="$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"

          printf 'ANDROID_HOME=%s\n' "$SDK_ROOT" >> "$GITHUB_ENV"
          printf 'ANDROID_SDK_ROOT=%s\n' "$SDK_ROOT" >> "$GITHUB_ENV"

          if [[ ! -x "$SDKMANAGER" ]]; then
            mkdir -p "$SDK_ROOT/cmdline-tools"
            curl -fsSL \
              -o "$RUNNER_TEMP/android-commandline-tools.zip" \
              "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
            rm -rf "$RUNNER_TEMP/android-commandline-tools" "$SDK_ROOT/cmdline-tools/latest"
            mkdir -p "$RUNNER_TEMP/android-commandline-tools"
            unzip -q "$RUNNER_TEMP/android-commandline-tools.zip" -d "$RUNNER_TEMP/android-commandline-tools"
            mv "$RUNNER_TEMP/android-commandline-tools/cmdline-tools" "$SDK_ROOT/cmdline-tools/latest"
          fi

          printf '%s\n' \
            "$SDK_ROOT/cmdline-tools/latest/bin" \
            "$SDK_ROOT/platform-tools" \
            "$SDK_ROOT/build-tools/35.0.0" >> "$GITHUB_PATH"

          yes | "$SDKMANAGER" --sdk_root="$SDK_ROOT" --licenses >/dev/null || true
          "$SDKMANAGER" --sdk_root="$SDK_ROOT" --install "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Build APK
        working-directory: android
        shell: bash
        run: ./build-apk.sh

      - name: Prepare release asset
        id: release_info
        shell: bash
        run: |
          mkdir -p release
          SHORT_SHA="${GITHUB_SHA::7}"
          RELEASE_TAG="apk-${SHORT_SHA}"
          APK_NAME="blackjack-royal-${SHORT_SHA}.apk"
          cp android/build/outputs/blackjack-royal.apk "release/${APK_NAME}"
          printf 'tag=%s\n' "$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          printf 'title=%s\n' "Blackjack Royal ${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          printf 'apk=%s\n' "release/${APK_NAME}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.release_info.outputs.tag }}"
          TITLE="${{ steps.release_info.outputs.title }}"
          APK="${{ steps.release_info.outputs.apk }}"
          API="https://api.github.com/repos/${GITHUB_REPOSITORY}"
          ASSET_NAME="$(basename "$APK")"

          release_json="$(curl -fsS \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${API}/releases/tags/${TAG}" || true)"

          if [[ -n "$release_json" ]]; then
            release_id="$(printf '%s' "$release_json" | python3 -c 'import json,sys; print(json.load(sys.stdin)["id"])')"
          else
            python3 -c 'import json,sys; tag,title,sha=sys.argv[1:4]; print(json.dumps({"tag_name": tag, "target_commitish": sha, "name": title, "body": f"APK Android generato automaticamente per il commit {sha}.", "draft": False, "prerelease": False}))' \
              "$TAG" "$TITLE" "$GITHUB_SHA" > release-payload.json
            release_id="$(curl -fsS \
              -X POST \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              --data-binary @release-payload.json \
              "${API}/releases" | python3 -c 'import json,sys; print(json.load(sys.stdin)["id"])')"
          fi

          assets_json="$(curl -fsS \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${API}/releases/${release_id}/assets")"
          existing_asset_id="$(printf '%s' "$assets_json" | python3 -c 'import json,sys; name=sys.argv[1]; print(next((str(asset["id"]) for asset in json.load(sys.stdin) if asset.get("name") == name), ""))' "$ASSET_NAME")"

          if [[ -n "$existing_asset_id" ]]; then
            curl -fsS \
              -X DELETE \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "${API}/releases/assets/${existing_asset_id}"
          fi

          curl -fsS \
            -X POST \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/vnd.android.package-archive" \
            --data-binary "@${APK}" \
            "https://uploads.github.com/repos/${GITHUB_REPOSITORY}/releases/${release_id}/assets?name=${ASSET_NAME}"
